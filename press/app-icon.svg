<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background: very dark warm stone, slightly lighter at center -->
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%"   stop-color="#272220"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </radialGradient>

    <!-- Ambient glow around the eye mark -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#D09268" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#D09268" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft-glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Ambient halo -->
  <ellipse cx="512" cy="512" rx="340" ry="200" fill="url(#halo)"/>

  <!-- Eye shape: filled + stroked for visibility at small sizes -->
  <!--
    Tips at x=192 / x=832 (640 px span).
    Control points at y=330 (top) and y=694 (bottom) — 182 px half-height.
  -->
  <path
    d="M 192 512 Q 512 330 832 512 Q 512 694 192 512 Z"
    fill="#D09268"
    fill-opacity="0.22"
    stroke="#D09268"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Four-pointed star (pupil) — outer radius 90 px -->
  <!--
    Top(512,422) Right(602,512) Bottom(512,602) Left(422,512)
    Inner diagonals at ~r=46 from center (45°): offset ±33 per axis
    (533,479) (533,545) (479,545) (479,479)
  -->
  <path
    d="M 512 422
       L 533 479  L 602 512
       L 533 545  L 512 602
       L 479 545  L 422 512
       L 479 479  Z"
    fill="#D09268"
    filter="url(#glow)"
  />

  <!-- Tip accent dots -->
  <circle cx="192" cy="512" r="10" fill="#D09268" opacity="0.55"/>
  <circle cx="832" cy="512" r="10" fill="#D09268" opacity="0.55"/>
</svg>
