<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 400 400" width="400" height="400">

  <!--
    Mira animated logo mark — mirrors MiraLogo.swift exactly:
      - Large four-pointed star at center (static)
      - Small companion star orbits on an ellipse (RX=104, RY=58, 5s/rev)
      - Ambient glow ellipse breathes between scale 1.0 → 1.4 (2.6s, ease-in-out)
      - Companion dims to 0.52 opacity in the back half of the orbit (z-depth illusion)
    Bezier star path: mira_icon_C.svg (Concept C, span ±318 units)
  -->

  <defs>

    <!-- Soft glow around stars -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Blur-only for ambient glow ellipse -->
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <!--
      Four-pointed star (Concept C bezier).
      Coordinate space: center at (0,0), tips at ±318 on each axis.
      Scale to desired size with transform="scale(k)" before use.
        Big star:    k = 0.3774  →  240 px diameter  (60 % of 400)
        Small star:  k = 0.0887  →  ~56 px diameter  (23.5 % of big)
    -->
    <path id="star" d="
      M 0 -318
      C 8 -214, 15 -140, 23 -102
      C 33 -56, 56 -33, 102 -23
      C 140 -15, 214 -8, 318 0
      C 214 8, 140 15, 102 23
      C 56 33, 33 56, 23 102
      C 15 140, 8 214, 0 318
      C -8 214, -15 140, -23 102
      C -33 56, -56 33, -102 23
      C -140 15, -214 8, -318 0
      C -214 -8, -140 -15, -102 -23
      C -56 -33, -33 -56, -23 -102
      C -15 -140, -8 -214, 0 -318 Z"/>

    <!--
      Orbit path: ellipse centered at (200,200), rx=104, ry=58, clockwise.
      Four quarter-arcs starting at the rightmost point (304,200).
      The companion traverses this in 5 s (one full revolution).
      Proportions match MiraLogo.swift:
        orbitRX = size * 0.260 = 400 * 0.260 = 104
        orbitRY = size * 0.145 = 400 * 0.145 = 58
    -->
    <path id="orbit" d="
      M 304 200
      A 104 58 0 0 1 200 258
      A 104 58 0 0 1  96 200
      A 104 58 0 0 1 200 142
      A 104 58 0 0 1 304 200 Z"/>

  </defs>

  <!-- Background: very dark warm stone (#05070A matches mira_icon_C.svg) -->
  <rect width="400" height="400" fill="#05070A"/>

  <!-- ── Ambient breathing glow ────────────────────────────────────────────── -->
  <!--
    Grouped so animateTransform scales around the group's local origin (0,0)
    which sits at (200,200) in document space — equivalent to SwiftUI's
    .scaleEffect(glowing ? 1.4 : 1.0) with transform-origin at center.
  -->
  <g transform="translate(200,200)">
    <ellipse cx="0" cy="0" rx="140" ry="88"
             fill="#F7C768" fill-opacity="0.13" filter="url(#blur)">
      <animateTransform attributeName="transform" type="scale"
        values="1;1.4;1" dur="2.6s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
        additive="replace"/>
    </ellipse>
  </g>

  <!-- ── Big star (center, static) ────────────────────────────────────────── -->
  <use xlink:href="#star" href="#star"
       transform="translate(200,200) scale(0.3774)"
       fill="#F7C768" filter="url(#glow)"/>

  <!-- ── Companion star (orbiting) ────────────────────────────────────────── -->
  <!--
    animateMotion moves the group's origin along #orbit.
    The star path is scaled around that origin (scale(0.0887) centered at 0,0).
    Opacity animate: full (1.0) in the front half (bottom arc, 0%–50%),
    dim (0.52) in the back half (top arc, 50%–100%) — mirrors the SwiftUI
    inFront = sin(rad) >= 0 z-ordering logic.
  -->
  <g>
    <use xlink:href="#star" href="#star"
         transform="scale(0.0887)"
         fill="#F7C768" filter="url(#glow)"/>
    <animateMotion dur="5s" repeatCount="indefinite" rotate="none">
      <mpath xlink:href="#orbit" href="#orbit"/>
    </animateMotion>
    <animate attributeName="opacity"
      values="1;1;0.52;0.52;1"
      keyTimes="0;0.49;0.5;0.99;1"
      dur="5s" repeatCount="indefinite"/>
  </g>

</svg>
