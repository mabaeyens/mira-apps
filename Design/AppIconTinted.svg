<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Black background — iOS overlays the tint colour -->
  <rect width="1024" height="1024" fill="#000000"/>

  <!-- Eye: white fill + stroke -->
  <path
    d="M 192 512 Q 512 330 832 512 Q 512 694 192 512 Z"
    fill="#FFFFFF"
    fill-opacity="0.20"
    stroke="#FFFFFF"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Star -->
  <path
    d="M 512 422
       L 533 479  L 602 512
       L 533 545  L 512 602
       L 479 545  L 422 512
       L 479 479  Z"
    fill="#FFFFFF"
    filter="url(#glow)"
  />

  <circle cx="192" cy="512" r="10" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="832" cy="512" r="10" fill="#FFFFFF" opacity="0.55"/>
</svg>
