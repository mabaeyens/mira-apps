<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background: warm vignette -->
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%"   stop-color="#282220"/>
      <stop offset="100%" stop-color="#1A1714"/>
    </radialGradient>

    <!-- Ambient halo -->
    <radialGradient id="halo" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#D09268" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#D09268" stop-opacity="0"/>
    </radialGradient>

    <!-- Star fill: light source from below → bright at lower-center, dark at upper tips -->
    <radialGradient id="starFill" cx="50%" cy="62%" r="58%">
      <stop offset="0%"   stop-color="#F5CA8E"/>
      <stop offset="48%"  stop-color="#D09268"/>
      <stop offset="100%" stop-color="#9C5A28"/>
    </radialGradient>

    <!-- Star glow: wide ambient + tight bright -->
    <filter id="starGlow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="36" result="wide"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="tight"/>
      <feMerge>
        <feMergeNode in="wide"/>
        <feMergeNode in="tight"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Hard-edged shadow -->
    <filter id="shadowBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>

    <!-- Soft ring glow -->
    <filter id="ringGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Ambient halo -->
  <circle cx="512" cy="512" r="440" fill="url(#halo)"/>

  <!-- Orbit: back half (behind star) — receding, dim -->
  <g transform="rotate(-32, 512, 512)">
    <path d="M 120,512 A 392 108 0 0 1 904,512"
      fill="none" stroke="#D09268" stroke-width="36" stroke-linecap="round"
      opacity="0.18"/>
  </g>

  <!-- 4-pointed star — hero mark, lit from below -->
  <path d="M 512,142 L 608,416 L 882,512
           L 608,608 L 512,882
           L 416,608 L 142,512
           L 416,416 Z"
    fill="url(#starFill)"
    filter="url(#starGlow)"/>

  <!-- Orbit shadow: offset above the ring (light from below casts shadow upward) -->
  <g transform="rotate(-32, 512, 512)">
    <g transform="translate(0, -38)">
      <path d="M 120,512 A 392 108 0 0 0 904,512"
        fill="none" stroke="#060402" stroke-width="72" stroke-linecap="round"
        opacity="0.96" filter="url(#shadowBlur)"/>
    </g>
  </g>

  <!-- Orbit: front half — soft outer glow layer -->
  <g transform="rotate(-32, 512, 512)">
    <path d="M 120,512 A 392 108 0 0 0 904,512"
      fill="none" stroke="#D09268" stroke-width="80" stroke-linecap="round"
      opacity="0.09" filter="url(#ringGlow)"/>
  </g>

  <!-- Orbit: front half — main ring body -->
  <g transform="rotate(-32, 512, 512)">
    <path d="M 120,512 A 392 108 0 0 0 904,512"
      fill="none" stroke="#C88A58" stroke-width="36" stroke-linecap="round"
      opacity="0.92"/>
  </g>

  <!-- Orbit: front half — lit lower edge (light from below → bottom of ring brighter) -->
  <g transform="rotate(-32, 512, 512)">
    <g transform="translate(0, 11)">
      <path d="M 120,512 A 392 108 0 0 0 904,512"
        fill="none" stroke="#F4D09A" stroke-width="13" stroke-linecap="round"
        opacity="0.55"/>
    </g>
  </g>
</svg>
