<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAF9F7"/>
    </radialGradient>

    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C07A4F" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#C07A4F" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <ellipse cx="512" cy="512" rx="340" ry="200" fill="url(#halo)"/>

  <path
    d="M 192 512 Q 512 330 832 512 Q 512 694 192 512 Z"
    fill="#C07A4F"
    fill-opacity="0.18"
    stroke="#C07A4F"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <path
    d="M 512 422
       L 533 479  L 602 512
       L 533 545  L 512 602
       L 479 545  L 422 512
       L 479 479  Z"
    fill="#C07A4F"
    filter="url(#glow)"
  />

  <circle cx="192" cy="512" r="10" fill="#C07A4F" opacity="0.50"/>
  <circle cx="832" cy="512" r="10" fill="#C07A4F" opacity="0.50"/>
</svg>
